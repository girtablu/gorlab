title: Jekyll TTRPG Catalog
description: A TTRPG content library
baseurl: "/jekyll-ttrpg-catalog"
url: "https://gulluth.github.io"
future: true

# jekyll-ttrpg-catalog theme settings
jtc:
  posts_per_page: 24
  show_authors_page: true
  show_submit_form: true
  theme: cerberus     # cerberus | wintry | vintage | crimson | pine | modern

# Jekyll settings
permalink: /:slug/
include: ["_pages"]

# Build
exclude:
  - node_modules
  - vendor
  - src
  - public
  - package.json
  - package-lock.json
  - vite.config.ts
  - tailwind.config.js
  - preview.html
  - AGENTS.md
  - README.md
  - CONTRIBUTORS.md
  - csv_to_jekyll.py
  - .github

plugins:
  - jekyll-feed
  - jekyll-seo-tag
