<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <title>{% if page.title and page.title != "Home" %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  {% seo %}
  {% feed_meta %}

  <link rel="stylesheet" href="{{ site.baseurl }}/assets/app.css" />

  <!-- Theme: respect system preference, persist manual override -->
  <script>
    (function () {
      var stored = localStorage.getItem('jekyll-ttrpg-catalog-theme')
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark')
      }
    })()
  </script>
</head>
