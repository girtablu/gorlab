<!DOCTYPE html>
<html lang="en" data-theme="{{ site.jtc.theme | default: 'cerberus' }}">
  {% include head.html %}
  <body class="min-h-screen">

    <header class="border-b border-current px-4 py-3">
      <div class="max-w-7xl mx-auto flex justify-between items-center">
        <a href="{{ site.baseurl }}/" class="font-bold text-lg tracking-tight hover:opacity-70">
          {{ site.title }}
        </a>
        <nav class="flex items-center gap-4 text-sm">
          {% if site.jtc.show_authors_page %}
          <a href="{{ site.baseurl }}/authors/" class="hover:opacity-70">Authors</a>
          {% endif %}
          {% if site.jtc.show_submit_form %}
          <a href="{{ site.baseurl }}/submit/" class="hover:opacity-70">Submit</a>
          {% endif %}
          <button
            id="theme-toggle"
            aria-label="Toggle dark mode"
            class="btn preset-outlined text-xs"
          >
            <span class="dark:hidden">Dark</span>
            <span class="hidden dark:inline">Light</span>
          </button>
        </nav>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    {% include footer.html %}

    <script src="{{ site.baseurl }}/assets/app.js" defer></script>
    <script>
      document.getElementById('theme-toggle').addEventListener('click', function () {
        var html = document.documentElement
        if (html.classList.contains('dark')) {
          html.classList.remove('dark')
          localStorage.setItem('jekyll-ttrpg-catalog-theme', 'light')
        } else {
          html.classList.add('dark')
          localStorage.setItem('jekyll-ttrpg-catalog-theme', 'dark')
        }
      })
    </script>
  </body>
</html>
