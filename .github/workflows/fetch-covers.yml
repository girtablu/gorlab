name: Fetch Cover Images

# Runs when a PR touching posts/ is opened or updated.
# Downloads any external cover-image URLs, commits the images to static/covers/,
# and rewrites frontmatter to use local paths — so the build never depends on
# external image hosts staying up.
#
# Note: requires write access to the PR branch. PRs from forks will skip the
# commit step (images must be added manually for fork PRs).

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'posts/**'

permissions:
  contents: write

jobs:
  fetch-covers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch external cover images
        run: node scripts/fetch-covers.js

      - name: Commit fetched images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/covers posts
          if ! git diff --cached --quiet; then
            git commit -m "chore: fetch external cover images"
            git push
          else
            echo "No cover images to commit."
          fi
